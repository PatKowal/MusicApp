<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MUSIC</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <a href="./"><h1>Pix</h1></a>
    <h2 th:text="${title}"></h2>
    <h3>
    </h3>
</header>
<section>

    <table>
        <tr>
            <th>Title</th>
            <th>Director</th>
            <th>Duration</th>
            <th>Albums</th>
        </tr>
        <tr th:each="t : ${tracks}">
            <td th:text="${t.title}"></td>
            <td>
                <a th:href="@{/tracks?artistId={id}(id=${t.artist.id})}"
                   th:text="${t.artist.firstName} + ' ' + ${t.artist.lastName}"></a>
            </td>
            <td class="duration" th:text="${t.duration}"></td>
            <td class="search-container">
                <a class="search" th:href="@{/albums?trackId={id}(id=${t.id})}"></a>
            </td>
        </tr>
    </table>

</section>
<div id="orders">
</div>
<footer>
    ${tip}
</footer>

</body>
</html>
